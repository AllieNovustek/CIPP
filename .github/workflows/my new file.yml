name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Fix Git Config Permissions
        run: |
          echo "Fixing Git permissions..."
          sudo chmod -R u+w .git || echo "Permission fix failed, continuing..."
      
      - name: Install Dependencies (if needed)
        run: |
          echo "Checking if dependencies need installation..."
          if [ -f "package.json" ]; then
            echo "Installing dependencies..."
            npm install || echo "Dependency installation failed!"
          else
            echo "No dependencies found."
          fi

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_MUSHROOM_07EC7901E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"  # Modify this if your app is in a subfolder
          api_location: ""  # Optional API path
          output_location: "/out"  # Optional build output path

      - name: Debug Deployment Issues
        if: failure()
        run: |
          echo "Deployment failed! Gathering logs..."
          cat /home/runner/.npm/_logs/* || echo "No NPM logs found."
          echo "Checking Azure Logs..."
          cat deployment.log || echo "No deployment logs found."

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job

    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_MUSHROOM_07EC7901E }}
          action: "close"
